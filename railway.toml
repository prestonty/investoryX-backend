[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# CHANGED: Using $PORT directly so Railway can inject the correct integer
startCommand = "sh -c 'uvicorn src.main:app --host 0.0.0.0 --port $PORT'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Health check ensures zero-downtime deployments
healthCheckPath = "/health" 
healthCheckTimeout = 100

# REMOVED: appControlPort. 
# Railway is smarter if you let it detect the port automatically from the $PORT variable.